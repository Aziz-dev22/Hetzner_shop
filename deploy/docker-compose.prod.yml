# ==========================================================
# Hetzner Shop
# Production Docker Compose
# ==========================================================


services:


  app:

    build:

      context: ..

      dockerfile: Dockerfile


    container_name: hetzner_shop_app


    restart: always


    env_file:

      - ../.env



    expose:

      - "8000"



    depends_on:

      - postgres

      - redis





  nginx:


    image: nginx:latest


    container_name: hetzner_shop_nginx


    restart: always



    ports:

      - "80:80"

      - "443:443"



    volumes:

      - ./nginx.conf:/etc/nginx/conf.d/default.conf

      - ../static:/app/static



    depends_on:

      - app





  postgres:


    image: postgres:16


    container_name: hetzner_shop_postgres


    restart: always



    env_file:

      - ../.env



    volumes:

      - postgres_prod_data:/var/lib/postgresql/data





  redis:


    image: redis:7


    container_name: hetzner_shop_redis


    restart: always



    volumes:

      - redis_prod_data:/data





  worker:


    build:

      context: ..


    container_name: hetzner_shop_worker


    restart: always



    command:


      celery -A workers.celery_app.celery_app worker --loglevel=info



    env_file:

      - ../.env



    depends_on:

      - redis





  scheduler:


    build:

      context: ..



    container_name:

      hetzner_shop_scheduler



    restart:

      always



    command:


      celery -A workers.celery_app.celery_app beat --loglevel=info



    env_file:

      - ../.env



    depends_on:

      - redis





volumes:


  postgres_prod_data:


  redis_prod_data:
