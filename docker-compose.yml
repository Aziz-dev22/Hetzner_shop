# ==========================================================
# Hetzner Shop
# Docker Compose Configuration
# ==========================================================


services:


  app:

    build:

      context: .


    container_name: hetzner_shop_app


    restart: always


    env_file:

      - .env


    ports:

      - "8000:8000"


    depends_on:

      - postgres

      - redis



  postgres:


    image: postgres:16


    container_name: hetzner_shop_postgres


    restart: always



    environment:

      POSTGRES_DB: ${DATABASE_NAME}

      POSTGRES_USER: ${DATABASE_USER}

      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}



    volumes:

      - postgres_data:/var/lib/postgresql/data



  redis:


    image: redis:7


    container_name: hetzner_shop_redis


    restart: always



    volumes:

      - redis_data:/data





  worker:


    build:

      context: .


    container_name: hetzner_shop_worker


    restart: always



    command:

      celery -A workers.celery_app.celery_app worker --loglevel=info



    env_file:

      - .env



    depends_on:

      - redis



volumes:


  postgres_data:


  redis_data:
